user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  charset       utf-8;

  server_tokens off;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json
    application/xml image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Static assets ─────────────────────────────────────────────────────────
    # Regex locations take priority over the prefix location below.
    # IMPORTANT: any add_header here drops parent-level add_header directives,
    # so we declare only what assets need and nothing more.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
      expires 1y;
      add_header Cache-Control       "public, immutable"  always;
      add_header X-Content-Type-Options "nosniff"         always;
      access_log off;
    }

    # ── SPA entry point + Angular routes ──────────────────────────────────────
    # All security headers live here. Because this location has add_header,
    # it does NOT inherit from a hypothetical server-level add_header block
    # (there is none), so there is no inheritance confusion.
    location / {
      try_files $uri $uri/ /index.html;

      # Never cache the HTML entry point so browsers always fetch the latest
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;

      # ── Security headers ───────────────────────────────────────────────────
      add_header X-Frame-Options        "DENY"                            always;
      add_header X-Content-Type-Options "nosniff"                         always;
      add_header X-XSS-Protection       "1; mode=block"                   always;
      add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

      # Angular injects component styles via <style> tags at runtime,
      # so style-src needs 'unsafe-inline'. Scripts are loaded from same
      # origin only. data: is required for inline SVG in img tags.
      add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        always;
    }
  }
}
