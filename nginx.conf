user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Hide nginx version in headers and error pages
  server_tokens off;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Gzip
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                              always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header X-XSS-Protection           "1; mode=block"                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
      always;

    # ── Cache control ─────────────────────────────────────────────────────────
    # Hashed assets (JS, CSS) — cache aggressively, Angular adds content hash
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # index.html — never cache so browsers always get the latest entry point
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header X-Frame-Options            "DENY"                              always;
      add_header X-Content-Type-Options     "nosniff"                           always;
      add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
      add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        always;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
