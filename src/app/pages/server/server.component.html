<app-main-layout>
  <app-page-header icon="server" title="Servers" subtitle="Define your API server endpoints" actionLabel="Add Server" (action)="forms.addServer()" />

  @for (server of forms.serverGroups; track $index) {
    <app-panel [attr.id]="'item-server-' + $index">
      <div class="flex justify-between items-center mb-4">
        <span class="text-xs font-semibold text-text-secondary uppercase tracking-wide">Server {{ $index + 1 }}</span>
        @if (forms.serversForm.length > 1) {
          <button
            (click)="forms.removeServer($index)"
            class="text-text-muted hover:text-danger transition-colors"
            aria-label="Delete server">
            <lucide-icon name="trash-2" [size]="16"></lucide-icon>
          </button>
        }
      </div>

      <form [formGroup]="server" class="grid grid-cols-2 gap-5">
        <div class="flex flex-col gap-1.5">
          <label [for]="'url-' + $index" class="text-xs font-semibold text-text-secondary">URL</label>
          <input
            [id]="'url-' + $index"
            type="url"
            formControlName="url"
            placeholder="https://api.example.com"
            class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label [for]="'entorno-' + $index" class="text-xs font-semibold text-text-secondary">Environment</label>
          <input
            [id]="'entorno-' + $index"
            type="text"
            formControlName="entorno"
            placeholder="production"
            class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
          />
        </div>

        <div class="col-span-2 flex flex-col gap-1.5">
          <label [for]="'descripcion-' + $index" class="text-xs font-semibold text-text-secondary">Description</label>
          <textarea
            [id]="'descripcion-' + $index"
            formControlName="descripcion"
            placeholder="Server description..."
            rows="3"
            class="border border-border rounded-md px-3 py-2.5 text-sm resize-y bg-surface-alt text-text-primary transition-colors"
          ></textarea>
        </div>
      </form>
    </app-panel>
  }
</app-main-layout>
