<app-main-layout>
  <!-- Content Header -->
  <div class="flex items-center gap-3 mb-6">
    <lucide-icon name="info" [size]="24" class="text-accent"></lucide-icon>
    <div>
      <h2 class="text-xl font-semibold text-text-primary">API Info</h2>
      <p class="text-sm text-text-secondary">General information about your API</p>
    </div>
  </div>

  <app-panel>
    <form [formGroup]="forms.apiInfoForm" class="grid grid-cols-2 gap-5">
      <div class="flex flex-col gap-1.5">
        <label for="title" class="text-xs font-semibold text-text-secondary">Title</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="My API"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="version" class="text-xs font-semibold text-text-secondary">Version</label>
        <input
          id="version"
          type="text"
          formControlName="version"
          placeholder="1.0.0"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="col-span-2 flex flex-col gap-1.5">
        <label for="description" class="text-xs font-semibold text-text-secondary">Description</label>
        <textarea
          id="description"
          formControlName="description"
          placeholder="API description..."
          rows="3"
          class="border border-border rounded-md px-3 py-2.5 text-sm resize-y bg-surface-alt text-text-primary transition-colors"
        ></textarea>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="contactEmail" class="text-xs font-semibold text-text-secondary">Contact email</label>
        <input
          id="contactEmail"
          type="email"
          formControlName="contactEmail"
          placeholder="contact@example.com"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="contactName" class="text-xs font-semibold text-text-secondary">Contact name</label>
        <input
          id="contactName"
          type="text"
          formControlName="contactName"
          placeholder="John Doe"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="contactUrl" class="text-xs font-semibold text-text-secondary">Contact URL</label>
        <input
          id="contactUrl"
          type="url"
          formControlName="contactUrl"
          placeholder="https://example.com/support"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="license" class="text-xs font-semibold text-text-secondary">License</label>
        <input
          id="license"
          type="text"
          formControlName="license"
          placeholder="MIT"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="licenseUrl" class="text-xs font-semibold text-text-secondary">License URL</label>
        <input
          id="licenseUrl"
          type="url"
          formControlName="licenseUrl"
          placeholder="https://opensource.org/licenses/MIT"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="col-span-2 flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-text-secondary uppercase tracking-wide">External Documentation</label>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="externalDocsUrl" class="text-xs font-semibold text-text-secondary">External Docs URL</label>
        <input
          id="externalDocsUrl"
          type="url"
          formControlName="externalDocsUrl"
          placeholder="https://docs.example.com"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="externalDocsDescription" class="text-xs font-semibold text-text-secondary">External Docs Description</label>
        <input
          id="externalDocsDescription"
          type="text"
          formControlName="externalDocsDescription"
          placeholder="Find more info here"
          class="border border-border rounded-md px-3 py-2.5 text-sm bg-surface-alt text-text-primary h-10 transition-colors"
        />
      </div>
    </form>
  </app-panel>
</app-main-layout>
