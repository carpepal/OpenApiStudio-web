<app-main-layout>
  <h2 class="text-2xl font-bold mb-4">API Information</h2>
  <app-panel>
    <form [formGroup]="forms.apiInfoForm" class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label for="title" class="text-sm font-medium">Title</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="My API"
          class="border border-gray-300 rounded px-3 py-2 text-sm"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="version" class="text-sm font-medium">Version</label>
        <input
          id="version"
          type="text"
          formControlName="version"
          placeholder="1.0.0"
          class="border border-gray-300 rounded px-3 py-2 text-sm"
        />
      </div>

      <div class="col-span-2 flex flex-col gap-1">
        <label for="description" class="text-sm font-medium">Description</label>
        <textarea
          id="description"
          formControlName="description"
          placeholder="API description..."
          rows="4"
          class="border border-gray-300 rounded px-3 py-2 text-sm resize-y"
        ></textarea>
      </div>

      <div class="flex flex-col gap-1">
        <label for="contactEmail" class="text-sm font-medium"
          >Contact email</label
        >
        <input
          id="contactEmail"
          type="email"
          formControlName="contactEmail"
          placeholder="contact@example.com"
          class="border border-gray-300 rounded px-3 py-2 text-sm"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="license" class="text-sm font-medium">License</label>
        <input
          id="license"
          type="text"
          formControlName="license"
          placeholder="MIT"
          class="border border-gray-300 rounded px-3 py-2 text-sm"
        />
      </div>
    </form>
  </app-panel>
</app-main-layout>
