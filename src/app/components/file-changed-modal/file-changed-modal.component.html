@if (isOpen()) {
  <!-- Overlay -->
  <div
    class="fixed inset-0 bg-black/40 z-50"
    (click)="close()"
  ></div>

  <!-- Modal panel -->
  <div
    class="fixed top-1/3 left-1/2 -translate-x-1/2 w-[420px] bg-white dark:bg-gray-900 rounded-xl shadow-2xl z-50 overflow-hidden"
    role="dialog"
    aria-modal="true"
    aria-label="Fichero modificado externamente"
  >
    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200 dark:border-gray-700">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
        </svg>
        <h2 class="text-sm font-semibold text-gray-800 dark:text-gray-100">Fichero modificado externamente</h2>
      </div>
      <button
        type="button"
        (click)="close()"
        class="p-1 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
        aria-label="Cerrar"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-5 py-5">
      <p class="text-sm text-gray-700 dark:text-gray-300">
        El fichero
        <span class="font-medium text-gray-900 dark:text-white">{{ fileName() }}</span>
        ha sido modificado desde el editor. ¿Quieres cargar los cambios en la aplicación?
      </p>
      <p class="mt-1.5 text-xs text-gray-400 dark:text-gray-500">
        Los cambios no guardados en el editor de API Studio se perderán.
      </p>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-2 px-5 py-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
      <button
        type="button"
        (click)="close()"
        class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
      >
        Ignorar
      </button>
      <button
        type="button"
        (click)="confirm()"
        class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors"
      >
        Sí, cargar cambios
      </button>
    </div>
  </div>
}
