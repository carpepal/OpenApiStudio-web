<div class="h-full flex flex-col">
  <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Bloques</div>
  <div class="flex flex-col p-2">
    <p class="text-xs text-gray-500 font-medium px-2 mb-1">Estructura global</p>

    <a [routerLink]="'/api-info'" routerLinkActive #rla1="routerLinkActive"
      [class.bg-white]="rla1.isActive" [class.text-indigo-700]="rla1.isActive"
      [class.bg-indigo-600]="!rla1.isActive" [class.text-white]="!rla1.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">
      API Info
    </a>

    <a [routerLink]="'/server'" routerLinkActive #rla2="routerLinkActive"
      [class.bg-white]="rla2.isActive" [class.text-indigo-700]="rla2.isActive"
      [class.bg-indigo-600]="!rla2.isActive" [class.text-white]="!rla2.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">
      Server
    </a>

    <a [routerLink]="'/tags'" routerLinkActive #rla3="routerLinkActive"
      [class.bg-white]="rla3.isActive" [class.text-indigo-700]="rla3.isActive"
      [class.bg-indigo-600]="!rla3.isActive" [class.text-white]="!rla3.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">
      Tags
    </a>

    <a [routerLink]="'/security'" routerLinkActive #rla4="routerLinkActive"
      [class.bg-white]="rla4.isActive" [class.text-indigo-700]="rla4.isActive"
      [class.bg-indigo-600]="!rla4.isActive" [class.text-white]="!rla4.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">
      Security
    </a>
  </div>

  <div class="flex flex-col p-2">
    <p class="text-xs text-gray-500 font-medium px-2 mb-1">Schemas</p>

    <a [routerLink]="'/schemas'" routerLinkActive #rla5="routerLinkActive"
      [class.bg-white]="rla5.isActive" [class.text-indigo-700]="rla5.isActive"
      [class.bg-indigo-600]="!rla5.isActive" [class.text-white]="!rla5.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">

  </div>

  <div class="flex flex-col p-2">
    <p class="text-xs text-gray-500 font-medium px-2 mb-1">Paths</p>

    <a [routerLink]="'/paths'" routerLinkActive #rla6="routerLinkActive"
      [class.bg-white]="rla6.isActive" [class.text-indigo-700]="rla6.isActive"
      [class.bg-indigo-600]="!rla6.isActive" [class.text-white]="!rla6.isActive"
      class="flex rounded-sm border border-indigo-600 w-full h-10 mb-1 px-3 text-sm font-medium items-center transition-colors duration-200">
      Paths
    </a>
  </div>
</div>
