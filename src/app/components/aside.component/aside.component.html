<app-search-modal #searchModal></app-search-modal>

<div class="h-full flex flex-col bg-surface-alt border-r border-border-light transition-colors">

  <!-- Search button -->
  <div class="px-3 pt-4 pb-2">
    <button
      type="button"
      (click)="openSearch()"
      class="flex items-center gap-2 w-full px-3 py-2 rounded-md border border-border text-sm text-text-secondary hover:border-accent hover:text-accent transition-colors duration-150 bg-surface"
    >
      <lucide-icon name="search" [size]="15" class="shrink-0"></lucide-icon>
      <span class="flex-1 text-left">Buscar</span>
      <span class="text-[11px] font-mono text-text-muted bg-surface-muted px-1.5 py-0.5 rounded">⌘K</span>
    </button>
  </div>

  <!-- Navigation sections -->
  <nav class="flex-1 overflow-y-auto pt-2">
    @for (section of navigationSections; track section.sectionLabel) {
      <div class="mb-2">
        <p class="px-6 py-2 text-[11px] font-semibold text-text-tertiary uppercase tracking-[2px]">
          {{ section.sectionLabel }}
        </p>
        @for (item of section.items; track item.routePath) {
          <a [routerLink]="item.routePath"
             routerLinkActive
             #rla="routerLinkActive"
             class="flex items-center gap-2.5 mx-3 px-3 py-2.5 rounded-md text-sm font-medium transition-colors duration-200 cursor-pointer"
             [class.text-accent]="rla.isActive"
             [class.bg-accent-subtle]="rla.isActive"
             [class.font-semibold]="rla.isActive"
             [class.text-text-secondary]="!rla.isActive"
             [class.hover:bg-surface-muted]="!rla.isActive"
             [class.hover:text-text-primary]="!rla.isActive">
            <!-- Active indicator bar -->
            @if (rla.isActive) {
              <div class="w-[3px] h-5 rounded-full bg-accent"></div>
            }
            <lucide-icon [name]="item.iconName" [size]="16"></lucide-icon>
            <span>{{ item.label }}</span>
            @if (item.isMandatory && !isApiInfoFilled()) {
              <lucide-icon name="alert-triangle" [size]="14" class="ml-auto text-warning"></lucide-icon>
            }
          </a>
        }
      </div>
    }
  </nav>

  <!-- Footer -->
  <div class="border-t border-border-light px-5 py-4 flex flex-col gap-2">
    <a class="flex items-center gap-2 text-xs text-text-muted hover:text-text-primary transition-colors cursor-pointer">
      <lucide-icon name="life-buoy" [size]="14"></lucide-icon>
      Help & Docs
    </a>
    <span class="text-[10px] font-mono font-medium text-text-muted">{{ appVersion }}</span>
  </div>
</div>
