<nav class="bg-surface-alt h-14 px-6 text-text-primary flex flex-row justify-between items-center border-b border-border-light transition-colors">
  <span class="font-mono font-bold text-base tracking-wider">openapistudio</span>
  <div class="flex flex-row gap-3 items-center">
    <button
      (click)="onTogglePreview()"
      class="flex items-center gap-1.5 bg-accent text-text-on-dark text-sm font-semibold rounded-md px-4 py-2 hover:bg-accent-hover transition-colors">
      <lucide-icon name="eye" [size]="16"></lucide-icon>
      Preview
    </button>
    <button
      (click)="onToggleTheme()"
      class="p-2 rounded-md hover:bg-surface-muted transition-colors"
      [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      <lucide-icon [name]="isDark() ? 'sun' : 'moon'" [size]="18"></lucide-icon>
    </button>
  </div>
</nav>
