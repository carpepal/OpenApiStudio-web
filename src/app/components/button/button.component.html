@if (type === "link") {
  <a
    class="flex rounded-sm border border-indigo-600 bg-indigo-600 w-full h-12 mb-2 mr-2 text-sm font-medium text-white text-center items-center justify-center hover:bg-transparent hover:text-indigo-600 focus:outline-none transition-colors duration-300"
    [routerLink]="link"
  >
    {{ label }}
  </a>
} @else {
  <a
    class="flex rounded-sm border border-indigo-600 bg-indigo-600 w-full h-12 mb-2 mr-2 text-sm font-medium text-white text-center items-center justify-center hover:bg-transparent hover:text-indigo-600 focus:outline-none transition-colors duration-300"
    (click)="onClick()"
  >
    {{ label }}
  </a>
}
