<app-navbar (togglePreview)="togglePreview()"></app-navbar>
<div class="flex flex-row h-[calc(100vh-56px)]" [class.select-none]="isResizing()" [class.cursor-col-resize]="isResizing()">
  <app-aside class="w-[260px] shrink-0 transition-colors"></app-aside>
  <main class="flex-1 overflow-auto min-w-0">
    <router-outlet />
  </main>
  @if (activePreview()) {
    <div
      class="w-1.5 shrink-0 cursor-col-resize bg-border-light hover:bg-accent-light transition-colors"
      [class.bg-accent-light]="isResizing()"
      (mousedown)="startResize($event)"
    ></div>
    <app-preview
      class="shrink-0"
      [style.width.px]="previewWidth()"
      [active]="activePreview()"
    ></app-preview>
  }
</div>
